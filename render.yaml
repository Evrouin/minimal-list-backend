databases:
  - name: minimalist-todo-db
    plan: free
    region: singapore
    databaseName: minimalist_todo_db

services:
  - type: web
    name: minimalist-todo-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: |
      pip install -r requirements/production.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py dbshell -- -c "DELETE FROM django_migrations WHERE app = 'todos';" 2>/dev/null || true &&
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: minimalist-todo-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: cron
    name: purge-deleted-accounts
    runtime: python
    plan: free
    region: singapore
    schedule: "0 3 * * *"
    buildCommand: pip install -r requirements/production.txt
    startCommand: python manage.py purge_deleted_accounts
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          name: minimalist-todo-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: minimalist-todo-db
          property: connectionString
